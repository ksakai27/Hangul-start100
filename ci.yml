# ハングル・スタート100

韓国語が超初心者の人向けに作った、**GitHub Pages で公開しやすい静的学習アプリ**です。

PC・スマートフォンのどちらでも使えるように、HTML / CSS / JavaScript だけで構成しています。外部APIに依存しないので、`docs/` フォルダをそのまま GitHub に置けば公開できます。

## できること

- 母音 10 個、合成母音 11 個、基本子音 14 個、発展子音 5 個をカード形式で学習
- 子音 × 母音の組み合わせ表を押して発音確認
- 5種類のクイズ
  - 母音
  - 子音
  - 組み合わせ
  - 音声だけで当てる
  - 100フレーズ
- やさしい 100 フレーズを
  - ハングル
  - カタカナ読みの目安
  - ローマ字
  - 日本語の意味
  で確認
- ブラウザの読み上げ機能で発音再生
- ローカル保存による進捗管理
- Twitch / YouTube 配信を意識した配信モード

## フォルダ構成

```text
korean-study-app/
├─ .github/
│  └─ workflows/
│     └─ ci.yml
├─ docs/
│  ├─ .nojekyll
│  ├─ index.html
│  ├─ styles.css
│  ├─ data.js
│  └─ app.js
├─ tests/
│  └─ validate-data.mjs
├─ package.json
└─ README.md
```

## いちばん簡単な公開方法（GitHub Pages）

### 1. GitHubで新しいリポジトリを作る

リポジトリ名は何でも大丈夫です。

例: `hangul-start100`

### 2. このフォルダの中身をアップロードする

`docs/` フォルダごと、そのままアップロードしてください。

### 3. GitHub Pages を有効にする

GitHub のリポジトリ画面で次の順に進みます。

1. **Settings** を開く
2. 左メニューの **Pages** を開く
3. **Build and deployment** の **Source** で **Deploy from a branch** を選ぶ
4. Branch は **main**（または master）
5. Folder は **/docs** を選ぶ
6. **Save** を押す

数分すると公開URLが表示されます。

## Git コマンドでアップロードしたい場合

リポジトリを作ったあと、ローカルで次を実行します。

```bash
git init
git add .
git commit -m "Initial commit"
git branch -M main
git remote add origin あなたのGitHubリポジトリURL
git push -u origin main
```

## ローカルで確認する方法

### そのまま開く方法

`docs/index.html` をダブルクリックしても確認できます。

### 簡単なローカルサーバーを使う方法

Python が入っていれば次でも確認できます。

```bash
python3 -m http.server 8000 -d docs
```

そのあとブラウザで `http://localhost:8000` を開きます。

## 音声について

- 発音はブラウザの **SpeechSynthesis** を使っています
- **Korean / ko-KR** の音声が見つかれば自動で優先します
- 端末やブラウザによっては韓国語の音声が入っていないことがあります
- その場合は既定音声にフォールバックします

### うまく再生されないとき

- Chrome / Edge / Safari の最新版で試す
- 端末側に韓国語音声を追加する
- 一度どれかのボタンをタップしてから再生する

## 配信向けの使い方

- **意味だけ表示 → コメントで予想 → 答え表示** の流れにする
- 配信モードで **ランダム文字** や **ランダムフレーズ** を引く
- **10問ノーミス** や **3回シャドーイング** を企画にする
- 「틀려도 괜찮아요（間違えても大丈夫）」を合言葉にすると雰囲気が柔らかくなります

## バグを減らすために入れてあるもの

- 外部ライブラリなし
- データを `data.js` に分離
- `tests/validate-data.mjs` でフレーズ数や重複をチェック
- GitHub Actions の `ci.yml` で push 時に構文チェックとデータ検証
- 相対パスだけを使っているので GitHub Pages のサブパスでも動作しやすい構成

## 自分で編集したいとき

### フレーズを増やす

`docs/data.js` の `PHRASES` を編集してください。

### デザインを変える

`docs/styles.css` を編集してください。

### クイズの動きを変える

`docs/app.js` を編集してください。

## 注意

- カタカナ表記は**発音の目安**です
- 本当の発音は必ず音声でも確認してください
- ブラウザ音声の品質は端末によって差があります

